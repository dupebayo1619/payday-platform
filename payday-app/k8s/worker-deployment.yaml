apiVersion: apps/v1
kind: Deployment
metadata:
  name: payday-worker
  namespace: staging
spec:
  replicas: 1
  selector:
    matchLabels:
      app: payday-worker
  template:
    metadata:
      labels:
        app: payday-worker
    spec:
      containers:
      - name: worker
        image: dupebayo1619/payday-worker:v1
        imagePullPolicy: IfNotPresent
        env:
        - name: DB_HOST
          value: "postgres-service"
        - name: DB_NAME
          value: "payday_db"
        - name: DB_USER
          value: "postgres"
        - name: DB_PASSWORD
          value: "vault_secret_pass"
        - name: REDIS_HOST
          value: "redis-service"
