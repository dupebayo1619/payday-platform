<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payday Platform | Production Dashboard</title>
    <style>
        body {
            background-color: #1a1e29;
            color: #e2e8f0;
            font-family: 'Segoe UI', Arial, sans-serif;
            text-align: center;
            padding: 40px 20px;
            margin: 0;
        }
        .container {
            max-width: 550px;
            margin: 0 auto;
            background: #242b3d;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.3);
        }
        h1 { color: #38bdf8; margin-bottom: 5px; }
        p.subtitle { color: #94a3b8; font-size: 14px; margin-top: 0; margin-bottom: 25px; }
        .form-group {
            text-align: left;
            margin-bottom: 20px;
        }
        label { display: block; font-size: 14px; margin-bottom: 6px; color: #94a3b8; }
        input {
            width: 100%;
            padding: 12px;
            background: #121620;
            border: 1px solid #334155;
            border-radius: 6px;
            color: #fff;
            font-size: 16px;
            box-sizing: border-box;
        }
        input:focus { border-color: #38bdf8; outline: none; }
        button {
            width: 100%;
            padding: 14px;
            background: #0284c7;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover { background: #0369a1; }
        .receipt-card {
            margin-top: 25px;
            padding: 20px;
            background: #121620;
            border-left: 4px solid #64748b;
            border-radius: 6px;
            text-align: left;
            display: none;
        }
        .status-badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 4px;
            font-weight: bold;
            font-size: 12px;
        }
        .PENDING { background: #b45309; color: #fef3c7; }
        .SUCCESSFUL { background: #15803d; color: #dcfce7; }
        .FAILED { background: #b91c1c; color: #fee2e2; }
    </style>
</head>
<body>

<div class="container">
    <h1>💰 Payday System v1.1</h1>
    <p class="subtitle">Asynchronous Microservices Ledger Platform</p>
    
    <div class="form-group">
        <label for="userId">Client Account ID</label>
        <input type="text" id="userId" value="USR-90214" placeholder="Enter User UUID">
    </div>
    
    <div class="form-group">
        <label for="amount">Payment Amount ($)</label>
        <input type="number" id="amount" value="2500.00" placeholder="0.00" step="0.01">
    </div>
    
    <button id="payBtn" onclick="submitPayment()">Authorize Payment Process</button>

    <div id="receipt" class="receipt-card">
        <h3 style="margin-top:0; color:#38bdf8;">Ledger Transaction Receipt</h3>
        <p><strong>Tracking ID:</strong> <span id="recTxId" style="color:#e2e8f0;">-</span></p>
        <p><strong>Amount:</strong> $<span id="recAmount">-</span></p>
        <p><strong>Broker Routing Sync:</strong> <span id="recBadge" class="status-badge PENDING">QUEUED</span></p>
        <p id="pollMsg" style="font-size:12px; color:#64748b; margin-bottom:0; font-style:italic;"></p>
    </div>
</div>

<script>
    // In Production K8s, an Ingress controller paths traffic through standard routing rules.
    // Leaving the endpoint relative ensures it effortlessly maps cleanly across cluster namespaces!
    const API_BASE = "/api/v1/payments";

    async function submitPayment() {
        const payBtn = document.getElementById('payBtn');
        const userId = document.getElementById('userId').value;
        const amount = document.getElementById('amount').value;
        
        if (!amount || !userId) {
            alert("Please input correct validation fields.");
            return;
        }

        payBtn.disabled = true;
        payBtn.innerText = "Transmitting to Ingress Matrix...";

        try {
            const response = await fetch(API_BASE, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ user_id: userId, amount: parseFloat(amount) })
            });

            const result = await response.json();
            
            if (response.status === 202) {
                // Initialize dynamic tracking status block
                document.getElementById('receipt').style.display = 'block';
                document.getElementById('recTxId').innerText = result.transaction_id;
                document.getElementById('recAmount').innerText = parseFloat(amount).toFixed(2);
                
                updateStatusBadge("PENDING");
                // Launch background polling mechanism to monitor the Redis queue fulfillment loop
                pollTransactionStatus(result.transaction_id);
            } else {
                alert("Platform rejected transaction transaction: " + (result.error || "Unknown"));
            }
        } catch (err) {
            console.error(err);
            alert("Network connection timeout reaching target API router.");
        } finally {
            payBtn.disabled = false;
            payBtn.innerText = "Authorize Payment Process";
        }
    }

    async function pollTransactionStatus(txId) {
        const pollMsg = document.getElementById('pollMsg');
        let attempts = 0;
        
        const interval = setInterval(async () => {
            attempts++;
            pollMsg.innerText = `Polling transactional state ledger... (Attempt ${attempts}/10)`;
            
            try {
                const res = await fetch(`${API_BASE}/${txId}`);
                if (res.status === 200) {
                    const data = await res.json();
                    if (data.status !== "PENDING") {
                        clearInterval(interval);
                        updateStatusBadge(data.status);
                        pollMsg.innerText = `State finalized safely in database ledger.`;
                    }
                }
            } catch (e) {
                console.error("Ledger query failure", e);
            }

            if (attempts >= 10) {
                clearInterval(interval);
                pollMsg.innerText = "Real-time socket session timed out. Verify state on backend pipeline.";
            }
        }, 2000); // Polls every 2 seconds
    }

    function updateStatusBadge(status) {
        const badge = document.getElementById('recBadge');
        badge.className = `status-badge ${status}`;
        badge.innerText = status;
    }
</script>

</body>
</html>
